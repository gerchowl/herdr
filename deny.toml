# cargo-deny config — wired by the guardrails pre-commit hook.
# Run locally: `cargo deny check`

[graph]
all-features = true

[licenses]
# Permissive licenses observed across the herdr dep graph. herdr itself is
# AGPL-3.0-or-later; the licenses below cover everything cargo-deny finds in
# the transitive graph as of writing.
allow = [
  "0BSD",
  "AGPL-3.0-or-later",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[advisories]
# Block on known unpatched vulnerabilities; warn on yanked so a transitive
# yank doesn't break commits while upstream catches up.
version = 2
yanked = "warn"
ignore = [
  # bincode 2.0.1 — upstream team has ceased development (not a security
  # vulnerability; the code is complete). Migration to postcard/wincode is
  # tracked as a separate spike, not blocking compliance today.
  "RUSTSEC-2025-0141",
]

[bans]
# Multiple versions of the same crate are common in a real dep graph; just warn.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
